<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="/server">
       <div>
         <label for="username"> Enter your username : </label>
         <input type="text" id="username" placeholder="Enter Username" name="user">
       </div>
        <div>
            <label for="password">Password : </label>
            <input type="password" id="password" placeholder="Enter Password" name="pass">
        </div>
        <button>Submit</button>
    </form>
    <hr>
    <form action="/server">
        <input type="text" placeholder="Search on google" name="q">
        <button>Submit</button>
        <!-- checkbox -->
        <input type="checkbox" name="age" id="age">
        <label for="age">I am 18+</label>
        <!-- Radio Button -->
         <div>
            <input type="radio" name="fruits" id="Apple" value="Apple">
            <label for="Apple">Apple</label>
            <input type="radio" name="fruits" id="Mango" value="Mango">
            <label for="Mango">Mango</label>
            <input type="radio" name="fruits" id="Banana" value="Banana">
            <label for="Banana">Banana</label>
            
         </div>
         <br>
         <div>
            Choose your subjects
            <input type="checkbox" name="sub" id="maths" value="maths">
            <label for="maths">Maths</label>
            <input type="checkbox" name="sub" id="physics" value="physics">
            <label for="physics">Physics</label>
            <input type="checkbox" name="sub" id="chemistry" value="chemistry">
            <label for="chemistry">Chemistry</label>
            <button>Submit</button>
         </div>
        
    </form>
</body>
</html>
