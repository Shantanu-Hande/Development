<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <h1>Feedback Form</h1>
    <div>
        <label for="name">Name: </label>
        <input type="text" placeholder="Write your Name" id="name" name="name">
    </div>
    <div>
        <label for="email">Email: </label>
        <input type="text" placeholder="Write your Email" id="email" name="email">
    </div>
    <div>
        <label for="feedback">Message: </label>
        <br>
        <textarea id="feedback" name="feedback" rows="4" cols="30"></textarea>
    </div>
    <div>
        <label for="rating">Rate us out of 5: </label>
        <br>
        <input type="radio" name="rating" id="one" value="one">
        <label for="one">1</label>
        <br>
        <input type="radio" name="rating" id="two" value="two">
        <label for="two">2</label>
        <br>
        <input type="radio" name="rating" id="three" value="three">
        <label for="three">3</label>
        <br>
        <input type="radio" name="rating" id="four" value="four">
        <label for="four">4</label>
        <br>
        <input type="radio" name="rating" id="five" value="five">
        <label for="five">5</label>
    </div>
    <div>
        <button>Send your message !!</button>
    </div>
    </form>
</body>
</html>
